<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Álvaro Tech Portfolio | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="img/favicon-circle.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page is-entering">
    <header class="site-header shell home-hero">
      <nav class="top-nav" aria-label="Main navigation">
        <p class="top-nav-meta">
          <span class="top-nav-location">Madrid, Spain</span>
          <span aria-hidden="true">&middot;</span>
          <span class="top-nav-location">Lausanne, Switzerland</span>
        </p>
        <div class="top-nav-links">
          <a class="top-nav-link active" href="./" data-transition>Home</a>
          <a class="top-nav-link" href="about.html" data-transition>About</a>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Theme mode: system" aria-pressed="mixed">◐</button>
        </div>
      </nav>

      <section class="profile-banner home-hero-banner" aria-label="Profile banner">
        <div class="profile-copy home-hero-copy">
          <p class="profile-kicker">Tech Portfolio</p>
          <h1 class="profile-name">Álvaro Arnaiz</h1>
          <p class="profile-tagline">My Robotics, Apps and Finance projects built with focus and clarity.</p>
          <a class="hero-scroll-link" href="#projects">View Projects</a>
        </div>

        <div class="hero-work-visual" aria-hidden="true">
          <img
            class="profile-photo hero-profile-photo"
            src="img/perfil.jpeg"
            alt=""
          />
          <div class="hero-orbit-ring"></div>
          <span class="work-chip chip-robotics">Robotics</span>
          <span class="work-chip chip-apps">Apps</span>
          <span class="work-chip chip-finance">Finance</span>
        </div>
      </section>
    </header>

    <main class="shell home-main">
      <section class="projects-toolbar" aria-label="Project filters">
        <label class="projects-filter-label" for="project-category-filter">Category</label>
        <select id="project-category-filter" class="projects-filter-select" data-project-filter>
          <option value="all" selected>All projects</option>
          <option value="Robotics">Robotics</option>
          <option value="Apps">Apps</option>
          <option value="Finance">Finance</option>
        </select>
      </section>

      <section class="project-list" data-project-list id="projects" aria-label="Project list"></section>
    </main>

    <footer class="site-footer shell" aria-label="Footer">
      <p class="footer-copy">&copy; 2026 Álvaro Arnaiz Burgos. All rights reserved.</p>
      <ul class="footer-links" aria-label="Contact links">
        <li><a href="https://www.linkedin.com/in/%C3%A1lvaro-arn%C3%A1iz-burgos" target="_blank" rel="noreferrer">LinkedIn</a></li>
        <li><a href=files/CV.pdf target="_blank" rel="noreferrer">CV</a></li>
        <li><a href="mailto:alvaroarnaizburgos@gmail.com">Email</a></li>
      </ul>
    </footer>

    <script src="js/projects-data.js" defer></script>
    <script src="js/theme.js" defer></script>
    <script src="js/transitions.js" defer></script>
    <script src="js/home.js" defer></script>
  </body>
</html>
